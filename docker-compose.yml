services:
  openswarm-builder-api:
    build: .
    ports:
      - "8090:8090"
    environment:
      - OPENSWARM_HOME=/data/swarms
      - OPENSWARM_SPECS_HOME=/data/specs
      - OPENSWARM_BUILDER_HOME=/data
    volumes:
      - openswarm-data:/data
    command: ["uvicorn", "openswarm_builder.adapters.http_server:app", "--host", "0.0.0.0", "--port", "8090"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  openswarm-data:
